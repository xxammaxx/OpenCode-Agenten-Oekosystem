name: OpenCode Visual QA
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'client/src/**'
      - 'src/**/*.css'
      - 'src/**/*.scss'
      - 'package.json'

jobs:
  visual-qa:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            npx playwright install --with-deps chromium 2>/dev/null || true
          fi
      - uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          model: anthropic/claude-sonnet-4-20250514
          agent: playwright-agent
          prompt: |
            Visual QA for this PR:
            1. Load playwright-visual-review skill
            2. Check for existing baseline screenshots
            3. Capture screenshots of changed pages
            4. Compare against baseline (pixelmatch)
            5. Run accessibility checks (axe-core)
            6. Classify diffs: REGRESSION / IMPROVEMENT / NEW / COSMETIC
            7. Post results with classification to PR
            If no baseline exists, create one and mark as NEEDS_HUMAN_REVIEW.
