name: OpenCode Security Review
on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'server/**'
      - 'src/**'
      - 'package*.json'
      - 'docker-compose*.yml'
      - 'Dockerfile'

jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          model: anthropic/claude-sonnet-4-20250514
          agent: security-agent
          prompt: |
            Security review of this PR:
            1. Load security-evidence-gate skill
            2. Check for:
               - Input validation issues
               - Authentication/authorization flaws
               - Secret leakage (hardcoded keys/tokens)
               - SQL injection vectors
               - XSS vulnerabilities
               - Dependency vulnerabilities (npm audit)
            3. Classify findings as VERIFIED or UNVERIFIED
            4. Post review comment with evidence and file:line references
            5. Do NOT claim severity without PoC reproduction
